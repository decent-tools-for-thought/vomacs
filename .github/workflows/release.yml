name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate tag matches project version
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "${GITHUB_REF_NAME}" = "v${version}"

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Build tagged source archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git archive \
            --format=tar.gz \
            --prefix="vomacsd-${VERSION}/" \
            "${GITHUB_REF_NAME}" \
            -o "dist/vomacsd-${VERSION}.tar.gz"
          (
            cd dist
            sha256sum "vomacsd-${VERSION}.tar.gz" > SHA256SUMS
          )

      - name: Verify wheel artifact library import
        run: |
          python -m venv .venv-wheel-import
          . .venv-wheel-import/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "$(ls dist/*.whl)"
          python -c "import vomacsd"

      - name: Verify wheel artifact console script
        run: |
          python -m venv .venv-wheel-cli
          . .venv-wheel-cli/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "$(ls dist/*.whl)"
          vomacsd --help

      - name: Verify sdist artifact library import
        run: |
          SDIST="$(python -c 'from pathlib import Path; import os; version = os.environ["GITHUB_REF_NAME"][1:]; candidates = [p for p in Path("dist").glob("vomacsd-*.tar.gz") if p.name != f"vomacsd-{version}.tar.gz"]; assert len(candidates) == 1, candidates; print(candidates[0])')"
          python -m venv .venv-sdist-import
          . .venv-sdist-import/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "${SDIST}"
          python -c "import vomacsd"

      - name: Verify sdist artifact console script
        run: |
          SDIST="$(python -c 'from pathlib import Path; import os; version = os.environ["GITHUB_REF_NAME"][1:]; candidates = [p for p in Path("dist").glob("vomacsd-*.tar.gz") if p.name != f"vomacsd-{version}.tar.gz"]; assert len(candidates) == 1, candidates; print(candidates[0])')"
          python -m venv .venv-sdist-cli
          . .venv-sdist-cli/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "${SDIST}"
          vomacsd --help

      - name: Upload verified release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build-and-verify

    steps:
      - name: Download verified release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2.4.2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/SHA256SUMS
