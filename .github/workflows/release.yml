name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish. Defaults to v<project version>.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve release tag
        id: release_meta
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag="${{ github.event.inputs.release_tag }}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          elif [ -z "$tag" ]; then
            tag="v${version}"
          fi
          test "$tag" = "v${version}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Build tagged source archive
        run: |
          VERSION="${{ steps.release_meta.outputs.tag }}"
          VERSION="${VERSION#v}"
          git archive \
            --format=tar.gz \
            --prefix="vomacsd-${VERSION}/" \
            HEAD \
            -o "dist/vomacsd-${VERSION}-release-source.tar.gz"
          (
            cd dist
            sha256sum "vomacsd-${VERSION}-release-source.tar.gz" > SHA256SUMS
          )

      - name: Verify wheel artifact library import
        run: |
          python -m venv .venv-wheel-import
          . .venv-wheel-import/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "$(ls dist/*.whl)"
          python -c "import vomacsd"
          python -c "from vomacsd.config import default_socket_path; assert default_socket_path().name == 'control.sock'"

      - name: Verify wheel artifact console script
        run: |
          python -m venv .venv-wheel-cli
          . .venv-wheel-cli/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "$(ls dist/*.whl)"
          vomacsd --help

      - name: Verify sdist artifact library import
        run: |
          SDIST="$(python -c 'from pathlib import Path; candidates = [p for p in Path("dist").glob("vomacsd-*.tar.gz") if "-release-source" not in p.name]; assert len(candidates) == 1, candidates; print(candidates[0])')"
          python -m venv .venv-sdist-import
          . .venv-sdist-import/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "${SDIST}"
          python -c "import vomacsd"
          python -c "from vomacsd.config import default_socket_path; assert default_socket_path().name == 'control.sock'"

      - name: Verify sdist artifact console script
        run: |
          SDIST="$(python -c 'from pathlib import Path; candidates = [p for p in Path("dist").glob("vomacsd-*.tar.gz") if "-release-source" not in p.name]; assert len(candidates) == 1, candidates; print(candidates[0])')"
          python -m venv .venv-sdist-cli
          . .venv-sdist-cli/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "${SDIST}"
          vomacsd --help

      - name: Upload verified release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build-and-verify

    steps:
      - name: Download verified release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2.4.2
        with:
          tag_name: ${{ needs.build-and-verify.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/SHA256SUMS
