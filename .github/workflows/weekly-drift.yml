name: weekly-drift

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  rebuild-and-verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify wheel install
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "$(ls dist/*.whl)"
          python -c "import vomacsd"
          python -c "from vomacsd.config import default_socket_path; assert default_socket_path().name == 'control.sock'"
          vomacsd --help

      - name: Verify sdist install
        run: |
          SDIST="$(ls dist/*.tar.gz | head -n 1)"
          python -m venv .venv-sdist
          . .venv-sdist/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "${SDIST}"
          python -c "import vomacsd"
          python -c "from vomacsd.config import default_socket_path; assert default_socket_path().name == 'control.sock'"
          vomacsd --help
